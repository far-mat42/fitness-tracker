<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fitness Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div>
      <p class="eyebrow">Personal tracker</p>
      <h1>Diet, Health &amp; Fitness</h1>
    </div>
    <div class="header-right">
      <p id="dbStatus" class="status">Connecting…</p>
      <div class="db-controls">
        <button id="addRecipeBtn" type="button" class="secondary">+ Recipe</button>
        <button id="addExerciseLibBtn" type="button" class="secondary">+ Exercise</button>
        <button id="sampleDataBtn" type="button" class="secondary">Sample data</button>
        <button id="settingsBtn" type="button">Settings</button>
      </div>
    </div>
  </header>

  <div class="view-switcher">
    <div class="segmented" role="group" aria-label="Top-level view">
      <button class="top-view-btn active" type="button" data-top-view="calendar">📅 Calendar</button>
      <button class="top-view-btn" type="button" data-top-view="trends">📈 Trends</button>
    </div>
  </div>

  <main>

    <!-- ── Calendar view ───────────────────────────────────────── -->
    <div id="calendarLayout" class="layout">

      <section class="panel calendar-panel" aria-labelledby="calendarHeading">
        <div class="calendar-topbar">
          <button id="prevMonthBtn" type="button" aria-label="Previous month">←</button>
          <div>
            <h2 id="calendarHeading">Calendar</h2>
            <p id="monthLabel" class="muted"></p>
          </div>
          <button id="nextMonthBtn" type="button" aria-label="Next month">→</button>
        </div>
        <div class="toolbar">
          <button id="todayBtn" type="button" class="secondary">Today</button>
        </div>
        <div id="legend" class="legend" aria-label="Calendar legend"></div>
        <div id="calendar" class="calendar" aria-label="Monthly calendar"></div>
      </section>

      <section class="panel details-panel" aria-labelledby="selectedDateHeading">
        <div class="details-header">
          <div>
            <p class="eyebrow">Selected day</p>
            <h2 id="selectedDateHeading"></h2>
          </div>
        </div>

        <div id="summaryCards" class="summary-cards"></div>

        <div class="tabs" role="tablist" aria-label="Entry forms">
          <button class="tab-btn active" type="button" data-tab="nutritionTab">Meals</button>
          <button class="tab-btn" type="button" data-tab="sleepTab">Sleep</button>
          <button class="tab-btn" type="button" data-tab="exerciseTab">Exercise</button>
          <button class="tab-btn" type="button" data-tab="bodyTab">Body</button>
        </div>

        <!-- ── Meals ──────────────────────────────────────────── -->
        <section id="nutritionTab" class="tab-section active" aria-labelledby="nutritionHeading">
          <h3 id="nutritionHeading">Add meal</h3>
          <form id="nutritionForm" class="grid-form">

            <label>Meal type
              <select id="mealType">
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
              </select>
            </label>

            <label class="checkbox-label">
              <input type="checkbox" id="nutritionIsCustom" />
              Custom / one-time entry
            </label>

            <!-- Recipe path (default) -->
            <div id="nutritionRecipeSection" class="full-width">
              <label>Recipe
                <select id="recipeSelect"><option value="">Select a recipe…</option></select>
              </label>
            </div>

            <!-- Custom path (shown when nutritionIsCustom is checked) -->
            <div id="nutritionCustomSection" class="full-width" style="display:none">
              <div class="sub-grid">
                <label class="full-width">Name
                  <input id="nutritionName" type="text" placeholder="e.g. Oatmeal" />
                </label>
                <label>Calories / serving
                  <input id="mealCalories" type="number" min="0" step="1" value="0" />
                </label>
                <label>Protein (g)
                  <input id="mealProtein" type="number" min="0" step="0.1" value="0" />
                </label>
                <label>Carbs (g)
                  <input id="mealCarbs" type="number" min="0" step="0.1" value="0" />
                </label>
                <label>Fat (g)
                  <input id="mealFat" type="number" min="0" step="0.1" value="0" />
                </label>
              </div>
              <label class="checkbox-label" style="margin-top:0.6rem">
                <input type="checkbox" id="nutritionSaveToLib" />
                Save to recipe library
              </label>
            </div>

            <!-- Quantity (always shown) -->
            <div id="nutritionQuantitySection" class="full-width">
              <div id="nutritionQtyToggle" class="qty-toggle" style="display:none">
                <button type="button" id="qtyServingsBtn" class="qty-btn active">Servings</button>
                <button type="button" id="qtyGramsBtn" class="qty-btn">Grams</button>
              </div>
              <div id="nutritionServingsRow">
                <label>Servings
                  <input id="servings" type="number" min="0.01" step="0.01" value="1" />
                </label>
              </div>
              <div id="nutritionGramsRow" style="display:none">
                <label>Grams
                  <input id="nutritionGrams" type="number" min="0" step="1" />
                </label>
              </div>
            </div>

            <button type="submit" class="full-width">Log meal</button>
          </form>
          <div id="nutritionList" class="list"></div>
        </section>

        <!-- ── Sleep ─────────────────────────────────────────── -->
        <section id="sleepTab" class="tab-section" aria-labelledby="sleepHeading">
          <h3 id="sleepHeading">Log sleep</h3>
          <form id="sleepForm" class="grid-form">
            <label>Hours slept
              <input id="sleepHours" type="number" min="0" max="24" step="0.25" placeholder="7.5" required />
            </label>
            <button type="submit">Save sleep</button>
          </form>
          <div id="sleepList" class="list"></div>
        </section>

        <!-- ── Exercise ───────────────────────────────────────── -->
        <section id="exerciseTab" class="tab-section" aria-labelledby="exerciseHeading">
          <h3 id="exerciseHeading">Log exercise</h3>
          <form id="exerciseForm" class="grid-form">

            <label class="full-width">Exercise
              <select id="exerciseLibSelect" required>
                <option value="">Select an exercise…</option>
              </select>
            </label>

            <!-- Per-set section (shown when exercise allows sets/reps) -->
            <div id="exerciseSetsSection" class="full-width" style="display:none">
              <div class="sets-header">
                <span class="sets-label">Sets</span>
                <button type="button" id="addSetBtn" class="secondary">+ Add set</button>
              </div>
              <div id="setRows" class="set-rows"></div>
            </div>

            <!-- Distance (shown when exercise allows distance) -->
            <label id="exerciseDistanceRow" style="display:none">Distance (km / mi)
              <input id="exerciseDistance" type="number" min="0" step="0.01" />
            </label>

            <button type="submit" class="full-width">Log exercise</button>
          </form>
          <div id="exerciseList" class="list"></div>
        </section>

        <!-- ── Body measurements ─────────────────────────────── -->
        <section id="bodyTab" class="tab-section" aria-labelledby="bodyHeading">
          <h3 id="bodyHeading">Body measurements</h3>
          <form id="bodyForm" class="grid-form">
            <label>Weight (lb)
              <input id="bodyWeight" type="number" min="0" step="0.1" placeholder="e.g. 175.5" />
            </label>
            <label>Waist (in)
              <input id="bodyWaist" type="number" min="0" step="0.1" placeholder="e.g. 32.5" />
            </label>
            <button type="submit" class="full-width">Save measurements</button>
          </form>
          <div id="bodyList" class="list"></div>
        </section>

      </section>
    </div>

    <!-- ── Trends view ─────────────────────────────────────────── -->
    <div id="trendsLayout" class="trends-layout" style="display:none">
      <div class="trends-controls">
        <div class="segmented" role="group" aria-label="Time range">
          <button class="range-btn" type="button" data-days="7">7 days</button>
          <button class="range-btn active" type="button" data-days="30">30 days</button>
          <button class="range-btn" type="button" data-days="90">90 days</button>
        </div>
      </div>
      <div id="chartsGrid" class="charts-grid"></div>
      <div class="chart-card chart-full" id="exerciseProgressCard">
        <div class="chart-card-header">
          <h3>Exercise Progress</h3>
          <select id="exerciseProgressSelect">
            <option value="">Pick an exercise…</option>
          </select>
        </div>
        <div id="exerciseProgressChart">
          <div class="chart-empty">Select an exercise above to see progress.</div>
        </div>
      </div>
    </div>

  </main>

  <footer class="site-footer">
    <p>Data synced automatically across devices via Cloudflare D1.</p>
  </footer>

  <!-- ── Recipe library modal ──────────────────────────────────── -->
  <dialog id="recipeModal">
    <div class="modal-header">
      <h2>Recipe Library</h2>
      <button type="button" id="recipeModalClose" class="modal-close" aria-label="Close">✕</button>
    </div>
    <form id="recipeForm" class="grid-form">
      <label class="full-width">Name
        <input id="recipeName" type="text" placeholder="e.g. Chicken rice bowl" required />
      </label>
      <label>Calories / serving
        <input id="recipeCalories" type="number" min="0" step="1" value="0" />
      </label>
      <label>Protein (g)
        <input id="recipeProtein" type="number" min="0" step="0.1" value="0" />
      </label>
      <label>Carbs (g)
        <input id="recipeCarbs" type="number" min="0" step="0.1" value="0" />
      </label>
      <label>Fat (g)
        <input id="recipeFat" type="number" min="0" step="0.1" value="0" />
      </label>
      <label class="checkbox-label full-width">
        <input type="checkbox" id="recipeAllowWeight" />
        Allow logging by weight (grams)
      </label>
      <label id="recipeGramsPerServingLabel" style="display:none">Grams per serving
        <input id="recipeGramsPerServing" type="number" min="1" step="1" />
      </label>
      <button type="submit">Save recipe</button>
    </form>
    <div id="recipeList" class="list modal-list"></div>
  </dialog>

  <!-- ── Exercise library modal ────────────────────────────────── -->
  <dialog id="exerciseLibModal">
    <div class="modal-header">
      <h2>Exercise Library</h2>
      <button type="button" id="exerciseLibModalClose" class="modal-close" aria-label="Close">✕</button>
    </div>
    <form id="exerciseLibForm" class="grid-form">
      <label>Name
        <input id="exerciseLibName" type="text" placeholder="e.g. Bench press" required />
      </label>
      <label>Type
        <select id="exerciseLibType">
          <option value="weight">Weight-based (lb / kg)</option>
          <option value="time">Time-based (min)</option>
        </select>
      </label>
      <label class="checkbox-label full-width">
        <input type="checkbox" id="exerciseLibAllowSetsReps" checked />
        Track sets &amp; reps
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="exerciseLibAllowDistance" />
        Track distance
      </label>
      <button type="submit">Save exercise</button>
    </form>
    <div id="exerciseLibList" class="list modal-list"></div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
